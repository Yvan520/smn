<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#e91e63">
    <title>赛马娘赛事攻略 - 50+赛道打法 | UmaGuide</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏇</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <div class="nav-brand">
                <a href="index.html">
                    <span class="logo">🏇</span>
                    <span class="brand-name">UmaGuide</span>
                </a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">首页</a></li>
                <li><a href="characters.html">角色图鉴</a></li>
                <li><a href="skills.html">技能数据库</a></li>
                <li><a href="races.html" class="active">赛事攻略</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <div class="breadcrumb container">
        <a href="index.html">首页</a>
        <span class="separator">/</span>
        <span>赛事攻略</span>
    </div>

    <section class="page-header container">
        <h1 class="page-title">赛事攻略</h1>
        <p class="page-subtitle">共收录 50+ 场赛事的详细分析</p>
    </section>

    <section class="races-list container">
        <div class="grid grid-3" id="racesList"></div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 UmaGuide. 游戏内容版权归 Cygames 所有</p>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('racesList');
            
            if (!window.racesData || !Array.isArray(window.racesData)) {
                container.innerHTML = '<div class="no-results">赛事数据加载中...</div>';
                return;
            }
            
            container.innerHTML = window.racesData.map(race => `
                <a href="race-detail.html?id=${race.id}" class="guide-card">
                    <div class="guide-badge">${race.grade}</div>
                    <h3 class="guide-title">${race.name_cn}</h3>
                    <p class="guide-excerpt">${race.distance}m · ${race.ground} · ${race.direction}回 · ${race.season}</p>
                    <div class="guide-meta">
                        <span>难度: ${race.difficulty}</span>
                    </div>
                </a>
            `).join('');
        });
    </script>
</body>
</html>
