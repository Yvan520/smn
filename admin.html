<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - 赛马娘攻略站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
        }
        h1 { color: #ff69b4; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
        }
        textarea { min-height: 100px; }
        .btn {
            background: #ff69b4;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #e64a8d; }
        .list { margin-top: 2rem; }
        .list-item {
            background: #f8f9fa;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏇 内容管理后台</h1>
        
        <div class="form-group">
            <label>攻略标题</label>
            <input type="text" id="title" placeholder="例：东海帝皇 URA 5星育成攻略">
        </div>
        
        <div class="form-group">
            <label>简介</label>
            <textarea id="excerpt" placeholder="攻略简介..."></textarea>
        </div>
        
        <button class="btn" onclick="addGuide()">添加攻略</button>
        
        <div class="list" id="guideList"></div>
    </div>

    <script>
        let guides = JSON.parse(localStorage.getItem('guides')) || [];

        function addGuide() {
            const title = document.getElementById('title').value;
            const excerpt = document.getElementById('excerpt').value;
            
            if (title && excerpt) {
                guides.push({ title, excerpt, date: new Date().toLocaleDateString() });
                localStorage.setItem('guides', JSON.stringify(guides));
                renderGuides();
                document.getElementById('title').value = '';
                document.getElementById('excerpt').value = '';
            }
        }

        function renderGuides() {
            const list = document.getElementById('guideList');
            list.innerHTML = '<h2>已添加的攻略</h2>' + guides.map((g, i) => `
                <div class="list-item">
                    <div>
                        <strong>${g.title}</strong>
                        <div style="color: #999; font-size: 0.9rem;">${g.date}</div>
                    </div>
                    <button class="btn" onclick="deleteGuide(${i})">删除</button>
                </div>
            `).join('');
        }

        function deleteGuide(index) {
            guides.splice(index, 1);
            localStorage.setItem('guides', JSON.stringify(guides));
            renderGuides();
        }

        renderGuides();
    </script>
</body>
</html>
