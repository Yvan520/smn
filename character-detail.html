<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#e91e63">
    <title id="pageTitle">角色详情 | UmaGuide</title>
    <meta name="description" id="pageDesc" content="">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏇</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <div class="nav-brand">
                <a href="index.html">
                    <span class="logo">🏇</span>
                    <span class="brand-name">UmaGuide</span>
                </a>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">首页</a></li>
                <li><a href="characters.html" class="active">角色图鉴</a></li>
                <li><a href="skills.html">技能数据库</a></li>
                <li><a href="races.html">赛事攻略</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <div class="breadcrumb container">
        <a href="index.html">首页</a>
        <span class="separator">/</span>
        <a href="characters.html">角色图鉴</a>
        <span class="separator">/</span>
        <span id="breadcrumbName">加载中...</span>
    </div>

    <article class="character-detail container" id="characterDetail">
        <!-- 动态加载 -->
    </article>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 UmaGuide. 游戏内容版权归 Cygames 所有</p>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const charId = urlParams.get('id');
            
            if (!charId) {
                window.location.href = 'characters.html';
                return;
            }
            
            if (!window.charactersData || !Array.isArray(window.charactersData)) {
                document.getElementById('characterDetail').innerHTML = `
                    <div class="error-message">
                        <h2>😢 数据加载失败</h2>
                        <p>请刷新页面重试，或<a href="characters.html">返回角色列表</a></p>
                    </div>
                `;
                return;
            }
            
            const character = window.charactersData.find(c => c.id === charId);
            
            if (!character) {
                document.getElementById('characterDetail').innerHTML = `
                    <div class="error-message">
                        <h2>😢 角色不存在</h2>
                        <p><a href="characters.html">返回角色列表</a></p>
                    </div>
                `;
                return;
            }
            
            renderCharacterDetail(character);
        });
        
        function renderCharacterDetail(char) {
            document.getElementById('pageTitle').textContent = `${char.name_cn}育成攻略 - 推荐技能因子配置 | UmaGuide`;
            document.getElementById('pageDesc').setAttribute('content', 
                `${char.name_cn}详细育成攻略：${char.breeding_tips.substring(0, 120)}...`
            );
            document.getElementById('breadcrumbName').textContent = char.name_cn;
            
            const recommendedSkills = window.skillsData ? 
                window.skillsData.filter(skill => 
                    char.recommended_skills && char.recommended_skills.includes(skill.id)
                ) : [];
            
            const container = document.getElementById('characterDetail');
            container.innerHTML = `
                <div class="detail-card detail-header">
                    <div class="detail-hero">
                        <div class="detail-image">
                            <img src="${char.image}" alt="${char.name_cn}" 
                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27400%27 height=%27400%27%3E%3Crect fill=%27%23f0f0f0%27 width=%27400%27 height=%27400%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 font-size=%2740%27 fill=%27%23999%27%3E暂无图片%3C/text%3E%3C/svg%3E'">
                        </div>
                        <div class="detail-info">
                            <h1 class="detail-title">${char.name_cn}</h1>
                            <p class="detail-subtitle">${char.name_jp}</p>
                            
                            <div class="detail-badges">
                                <span class="badge badge-rarity">${'★'.repeat(char.rarity)}</span>
                                <span class="badge badge-type">${char.type}</span>
                                ${char.distance.map(d => `<span class="badge badge-distance">${d}</span>`).join('')}
                            </div>
                            
                            <div class="stats-panel">
                                <h3>基础属性</h3>
                                <div class="stats-grid">
                                    <div class="stat-item">
                                        <div class="stat-label">速度</div>
                                        <div class="stat-value stat-${char.stats.speed}">${char.stats.speed}</div>
                                    </div>
                                    <div class="stat-item">
                                        <div class="stat-label">耐力</div>
                                        <div class="stat-value stat-${char.stats.stamina}">${char.stats.stamina}</div>
                                    </div>
                                    <div class="stat-item">
                                        <div class="stat-label">力量</div>
                                        <div class="stat-value stat-${char.stats.power}">${char.stats.power}</div>
                                    </div>
                                    <div class="stat-item">
                                        <div class="stat-label">根性</div>
                                        <div class="stat-value stat-${char.stats.guts}">${char.stats.guts}</div>
                                    </div>
                                    <div class="stat-item">
                                        <div class="stat-label">智力</div>
                                        <div class="stat-value stat-${char.stats.wisdom}">${char.stats.wisdom}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="ad-container">
                    <div class="ad-placeholder">广告位</div>
                </div>

                <div class="detail-card">
                    <h2 class="section-title">
                        <span class="title-icon">📋</span>
                        育成建议
                    </h2>
                    <div class="content-box">
                        <p>${char.breeding_tips}</p>
                    </div>
                </div>

                <div class="detail-card">
                    <h2 class="section-title">
                        <span class="title-icon">⚡</span>
                        推荐技能
                    </h2>
                    ${recommendedSkills.length > 0 ? `
                        <div class="skills-grid">
                            ${recommendedSkills.map(skill => `
                                <a href="skill-detail.html?id=${skill.id}" class="skill-card">
                                    <div class="skill-icon">
                                        <img src="${skill.icon}" alt="${skill.name_cn}"
                                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27%3E%3Crect fill=%27%23f0f0f0%27 width=%27100%27 height=%27100%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 font-size=%2740%27%3E⚡%3C/text%3E%3C/svg%3E'">
                                    </div>
                                    <div class="skill-info">
                                        <h3 class="skill-name">${skill.name_cn}</h3>
                                        <p class="skill-effect">${skill.effect}</p>
                                        <span class="skill-rarity">${skill.rarity === 'normal' ? '普通' : skill.rarity === 'rare' ? '稀有' : '固有'}</span>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    ` : '<p style="text-align: center; color: #999;">暂无推荐技能数据</p>'}
                </div>

                <div class="detail-card">
                    <h2 class="section-title">
                        <span class="title-icon">🧬</span>
                        推荐因子
                    </h2>
                    <div class="factors-list">
                        ${char.recommended_factors.map(factor => `
                            <div class="factor-tag">${factor}</div>
                        `).join('')}
                    </div>
                    <div class="content-box">
                        <p>因子继承建议：优先选择以上因子进行继承，可以最大化发挥${char.name_cn}的潜力。</p>
                    </div>
                </div>

                <div class="detail-card">
                    <h2 class="section-title">
                        <span class="title-icon">👥</span>
                        相似角色
                    </h2>
                    <div class="related-characters">
                        ${getSimilarCharacters(char).map(c => `
                            <a href="character-detail.html?id=${c.id}" class="mini-character-card">
                                <img src="${c.icon}" alt="${c.name_cn}" loading="lazy"
                                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27200%27 height=%27200%27%3E%3Crect fill=%27%23f0f0f0%27 width=%27200%27 height=%27200%27/%3E%3Ctext x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 font-size=%2720%27 fill=%27%23999%27%3E暂无%3C/text%3E%3C/svg%3E'">
                                <span>${c.name_cn}</span>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function getSimilarCharacters(currentChar) {
            if (!window.charactersData) return [];
            return window.charactersData
                .filter(c => c.id !== currentChar.id && c.type === currentChar.type)
                .slice(0, 6);
        }
    </script>
</body>
</html>
