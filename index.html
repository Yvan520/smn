<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛马娘攻略站 - 育成攻略·支援卡·技能数据库</title>
    <meta name="description" content="最全面的赛马娘Pretty Derby中文攻略站，提供育成攻略、支援卡推荐、技能数据库等">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 加载动画 -->
    <div id="pageLoader" class="page-loader">
        <div class="loader-spinner"></div>
        <p>加载中...</p>
    </div>

    <!-- 导航栏 -->
    <header class="header">
        <nav class="nav container">
            <div class="logo">
                <span>🏇</span>
                <span>赛马娘攻略站</span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="#home" class="nav-link active">首页</a></li>
                <li><a href="#tools" class="nav-link">工具箱</a></li>
                <li><a href="#guides" class="nav-link">攻略中心</a></li>
                <li><a href="#calculator" class="nav-link">计算器</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <!-- 搜索区 -->
    <section class="search-section">
        <div class="container">
            <div class="search-wrapper">
                <input type="search" class="search-input" id="searchInput" placeholder="搜索马娘、技能、支援卡..." autocomplete="off">
                <button class="search-btn" id="searchBtn">
                    <span>🔍</span>
                    <span>搜索</span>
                </button>
            </div>
            <div class="search-suggestions" id="searchSuggestions" style="display:none;"></div>
        </div>
    </section>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            
            <!-- 统计面板 -->
            <section class="stats-bar fade-in">
                <div class="stat-item">
                    <div class="stat-number" id="userCount">0</div>
                    <div class="stat-label">马娘角色</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="supportCount">0</div>
                    <div class="stat-label">支援卡</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="guideCount">0</div>
                    <div class="stat-label">攻略文章</div>
                </div>
            </section>

            <!-- 广告位 -->
            <aside class="ad-container">
                <div class="ad-label">广告</div>
                <div class="ad-placeholder">
                    <p>Google AdSense 广告位</p>
                    <p style="font-size: 0.8rem; margin-top: 0.5rem;">728x90</p>
                </div>
            </aside>

            <!-- 快捷工具 -->
            <section id="tools" class="tools-section fade-in">
                <h2 class="section-title">
                    <span>⚡</span>
                    快捷工具
                </h2>
                <div class="tools-grid" id="toolsGrid"></div>
            </section>

            <!-- 热门攻略 -->
            <section id="guides" class="guides-section fade-in">
                <h2 class="section-title">
                    <span>🔥</span>
                    热门攻略
                </h2>
                <div class="guide-grid" id="guideGrid"></div>
            </section>

            <!-- 最新动态 -->
            <section class="news-section fade-in">
                <h2 class="section-title">
                    <span>📰</span>
                    最新动态
                </h2>
                <div class="news-list" id="newsList"></div>
            </section>

            <!-- 育成计算器 -->
            <section id="calculator" class="calculator-section fade-in">
                <h2 class="section-title">
                    <span>📈</span>
                    育成属性计算器
                </h2>
                <p class="section-desc">输入当前属性和支援卡加成，实时计算最终数值</p>
                
                <div class="calculator-wrapper">
                    <div class="stat-inputs">
                        <div class="stat-input-group">
                            <label>
                                <span style="color: #e74c3c;">⚡</span>
                                速度 Speed
                            </label>
                            <input type="number" id="speed" min="0" max="1200" value="800">
                            <input type="range" id="speedRange" min="0" max="1200" value="800" class="stat-slider">
                        </div>
                        
                        <div class="stat-input-group">
                            <label>
                                <span style="color: #3498db;">💧</span>
                                耐力 Stamina
                            </label>
                            <input type="number" id="stamina" min="0" max="1200" value="600">
                            <input type="range" id="staminaRange" min="0" max="1200" value="600" class="stat-slider">
                        </div>
                        
                        <div class="stat-input-group">
                            <label>
                                <span style="color: #f39c12;">💪</span>
                                力量 Power
                            </label>
                            <input type="number" id="power" min="0" max="1200" value="700">
                            <input type="range" id="powerRange" min="0" max="1200" value="700" class="stat-slider">
                        </div>
                        
                        <div class="stat-input-group">
                            <label>
                                <span style="color: #e67e22;">🔥</span>
                                毅力 Guts
                            </label>
                            <input type="number" id="guts" min="0" max="1200" value="500">
                            <input type="range" id="gutsRange" min="0" max="1200" value="500" class="stat-slider">
                        </div>
                        
                        <div class="stat-input-group">
                            <label>
                                <span style="color: #9b59b6;">🧠</span>
                                智力 Intelligence
                            </label>
                            <input type="number" id="intelligence" min="0" max="1200" value="650">
                            <input type="range" id="intelligenceRange" min="0" max="1200" value="650" class="stat-slider">
                        </div>
                    </div>

                    <div class="calculator-result">
                        <div class="result-score">
                            <div class="score-label">综合评分</div>
                            <div class="score-value" id="totalScore">0</div>
                        </div>
                        <div class="result-rating" id="ratingDisplay">
                            <div class="rating-stars"></div>
                            <div class="rating-text"></div>
                        </div>
                        <div class="result-suggestion" id="suggestionText">
                            输入属性值开始计算
                        </div>
                        <button class="btn-primary" id="saveStatsBtn">保存配置</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <p>最专业的赛马娘中文攻略站</p>
                </div>
                <div class="footer-section">
                    <h3>快捷链接</h3>
                    <ul id="friendLinks">
                        <li><a href="#tools">工具箱</a></li>
                        <li><a href="#guides">攻略中心</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 赛马娘攻略站. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Cookie 同意提示 -->
    <div id="cookieConsent" class="cookie-consent" style="display:none;">
        <p>本站使用 Cookie 来提升用户体验。继续使用即表示同意 <a href="#">隐私政策</a></p>
        <button id="acceptCookies" class="btn-primary" style="padding: 0.5rem 1.5rem; font-size: 0.9rem;">同意</button>
    </div>

    <!-- 返回顶部 -->
    <button id="backToTop" class="back-to-top" style="display: none;">↑</button>

    <script src="js/main.js"></script>
    <script>
        window.addEventListener('load', function() {
            document.getElementById('pageLoader').classList.add('hidden');
        });
    </script>
</body>
</html>
