function qs(id){return document.getElementById(id)}

function render(){
  var s = C.stats || F.stats;
  qs('charCount').textContent = s.characterCount || 0;
  qs('suppCount').textContent = s.supportCount || 0;
  qs('guideCount').textContent = s.guideCount || 0;

  var toolsHtml = '', tools = C.tools || F.tools || [];
  for(var i=0;i<tools.length;i++){
    var t=tools[i]; toolsHtml += '<div class="tool-card"><span class="icon">'+t.icon+'</span><h3>'+t.title+'</h3><p>'+t.description+'</p></div>';
  }
  qs('toolsGrid').innerHTML = toolsHtml;

  var guidesHtml = '', guides = C.guides || F.guides || [];
  for(var i=0;i<guides.length;i++){
    var g=guides[i], v=g.views||0, vs=v>=10000?(v/10000).toFixed(1)+'w':v.toLocaleString();
    var tagsHtml=''; if(g.tags){for(var j=0;j<g.tags.length;j++) tagsHtml+='<span class="tag">'+g.tags[j]+'</span>'}
    guidesHtml += '<div class="guide-card"><div class="head">'+(g.icon||'📖')+'</div><div class="body"><h3>'+g.title+'</h3><div class="meta"><span>👁 '+vs+'</span><span>⏱ '+(g.date||'')+'</span></div><div class="excerpt">'+tagsHtml+' '+g.excerpt+'</div></div></div>';
  }
  qs('guideGrid').innerHTML = guidesHtml;

  var newsHtml = '', news = C.news || F.news || [];
  for(var i=0;i<news.length;i++){
    var n=news[i]; 
    try{
      var d=new Date(n.date), dd=d.getDate(), mm=d.getMonth()+1;
      newsHtml += '<div class="news-item"><div class="news-date"><div class="d">'+dd+'</div><div class="m">'+mm+'月</div></div><div><h4>'+n.title+'</h4><p>'+n.excerpt+'</p></div></div>';
    }catch(e){newsHtml += '<div class="news-item"><div><h4>'+n.title+'</h4><p>'+n.excerpt+'</p></div></div>'}
  }
  qs('newsList').innerHTML = newsHtml;

  var linksHtml = '', links = C.friendLinks || F.friendLinks || [];
  for(var i=0;i<links.length;i++){
    linksHtml += '<li><a href="'+links[i].url+'" target="_blank" rel="noopener">'+links[i].name+'</a></li>';
  }
  qs('friendLinks').innerHTML = linksHtml;

  renderChars();
  renderSupps();
}

function renderChars(){
  var ch = C.characters || F.characters || [];
  var allTags = [];
  for(var i=0;i<ch.length;i++){
    var tags = ch[i].tags || [];
    for(var j=0;j<tags.length;j++){
      if(allTags.indexOf(tags[j])===-1) allTags.push(tags[j]);
    }
  }
  allTags.sort();
  var filterTags = ['逃马','先行','差马','追马','SSR','SR','R'];
  var filtrHtml = '<button class="on" data-v="all">全部</button>';
  for(var i=0;i<filterTags.length;i++){
    if(allTags.indexOf(filterTags[i])!==-1) filtrHtml += '<button data-v="'+filterTags[i]+'">'+filterTags[i]+'</button>';
  }
  var f = qs('charFiltr');
  f.innerHTML = filtrHtml;
  var btns = f.querySelectorAll('button');
  for(var i=0;i<btns.length;i++){
    btns[i].onclick = (function(b){return function(){
      var all = f.querySelectorAll('button');
      for(var j=0;j<all.length;j++) all[j].classList.remove('on');
      b.classList.add('on');
      renderCharsFilter(b.getAttribute('data-v'));
    }})(btns[i]);
  }
  renderCharsFilter('all');
}

function renderCharsFilter(filter){
  var ch = C.characters || F.characters || [];
  var filtered = [];
  for(var i=0;i<ch.length;i++){
    if(filter==='all' || (ch[i].tags||[]).indexOf(filter)!==-1) filtered.push(ch[i]);
  }
  var html = '';
  for(var i=0;i<filtered.length;i++){
    var c=filtered[i];
    var tagsHtml='';
    var ctags=c.tags||[];
    for(var j=0;j<ctags.length;j++){
      if(['SSR','SR','R'].indexOf(ctags[j])===-1) tagsHtml+='<span>'+ctags[j]+'</span>';
    }
    var rarity = '';
    for(var j=0;j<ctags.length;j++){
      if(['SSR','SR','R'].indexOf(ctags[j])!==-1){ rarity=ctags[j]; break; }
    }
    html += '<div class="char-card"><div class="name">'+c.name+'</div><div class="jp">'+(c.jp||'')+'</div><div class="tags">'+tagsHtml+'</div></div>';
  }
  qs('charGrid').innerHTML = html;
}

function renderSupps(){
  var sp = C.supports || F.supports || [];
  var allTags = [];
  for(var i=0;i<sp.length;i++){
    var tags = sp[i].tags || [];
    for(var j=0;j<tags.length;j++){
      if(allTags.indexOf(tags[j])===-1) allTags.push(tags[j]);
    }
  }
  var filterTags = ['SSR','SR','R','限定'];
  var filtrHtml = '<button class="on" data-v="all">全部</button>';
  for(var i=0;i<filterTags.length;i++){
    if(allTags.indexOf(filterTags[i])!==-1) filtrHtml += '<button data-v="'+filterTags[i]+'">'+filterTags[i]+'</button>';
  }
  var f = qs('suppFiltr');
  f.innerHTML = filtrHtml;
  var btns = f.querySelectorAll('button');
  for(var i=0;i<btns.length;i++){
    btns[i].onclick = (function(b){return function(){
      var all = f.querySelectorAll('button');
      for(var j=0;j<all.length;j++) all[j].classList.remove('on');
      b.classList.add('on');
      renderSuppsFilter(b.getAttribute('data-v'));
    }})(btns[i]);
  }
  renderSuppsFilter('all');
}

function renderSuppsFilter(filter){
  var sp = C.supports || F.supports || [];
  var filtered = [];
  for(var i=0;i<sp.length;i++){
    if(filter==='all' || (sp[i].tags||[]).indexOf(filter)!==-1) filtered.push(sp[i]);
  }
  var html = '';
  for(var i=0;i<filtered.length;i++){
    var s=filtered[i], stags=s.tags||[];
    var meta='', tagsHtml='', cls='';
    for(var j=0;j<stags.length;j++){
      var t=stags[j];
      if(['SSR','SR','R','限定','速度','耐力','力量','毅力','智力','友人','团体'].indexOf(t)===-1) meta+=(meta?' · ':'')+t;
      else {
        if(['SSR','SR','R','限定'].indexOf(t)!==-1) cls=t;
        tagsHtml+='<span>'+t+'</span>';
      }
    }
    html += '<div class="supp-card"><div class="name">'+s.name+'</div><div class="meta">'+(meta||'通用')+'</div><div class="tags">'+tagsHtml+'</div></div>';
  }
  qs('suppGrid').innerHTML = html;
}

function fmt(n){return n>=10000?(n/10000).toFixed(1)+'w':n.toLocaleString()}

var searchData=[];
function buildSearch(){
  var chars = C.characters || F.characters || [];
  var supps = C.supports || F.supports || [];
  var guides = C.guides || F.guides || [];
  for(var i=0;i<chars.length;i++) searchData.push({n:chars[i].name,ty:'角色'});
  for(var i=0;i<supps.length;i++) searchData.push({n:supps[i].name,ty:'支援卡'});
  for(var i=0;i<guides.length;i++) searchData.push({n:guides[i].title,ty:'攻略'});
}

load();

function load(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET','data/content.json',true);
  xhr.onload = function(){
    try{
      if(xhr.status===200) C = JSON.parse(xhr.responseText);
      else C = F;
    }catch(e){C=F}
    render();
    buildSearch();
    qs('loader').classList.add('hidden');
    var cards = document.querySelectorAll('.tool-card,.guide-card,.news-item');
    for(var i=0;i<cards.length;i++){
      cards[i].style.animationDelay=(i*0.03)+'s';
      cards[i].classList.add('rv');
    }
  };
  xhr.onerror = function(){
    C = F;
    render();
    buildSearch();
    qs('loader').classList.add('hidden');
  };
  xhr.send();
}

var si=qs('searchInput'), sb=qs('searchBtn'), sg=qs('suggestions');
function doSearch(q){
  if(!q||q.length<1){sg.style.display='none';return}
  var k=q.toLowerCase(), r=[];
  for(var i=0;i<searchData.length;i++){
    if(searchData[i].n.toLowerCase().indexOf(k)!==-1||searchData[i].n.indexOf(k)!==-1){
      r.push(searchData[i]);
      if(r.length>=12) break;
    }
  }
  if(r.length===0){sg.innerHTML='<div class="sug-item" style="color:var(--muted)">未找到相关结果</div>';sg.style.display='block';return}
  var html='';
  for(var i=0;i<r.length;i++) html+='<div class="sug-item"><span class="tp">'+r[i].ty+'</span><strong>'+r[i].n+'</strong></div>';
  sg.innerHTML=html;sg.style.display='block';
}
si.oninput=function(){doSearch(this.value)};
si.onblur=function(){setTimeout(function(){sg.style.display='none'},200)};
si.onfocus=function(){if(si.value)doSearch(si.value)};
sb.onclick=function(){doSearch(si.value)};
si.onkeydown=function(e){if(e.key==='Enter')doSearch(si.value)};

var cs={spd:800,sta:600,pow:700,gut:500,int:650};
['spd','sta','pow','gut','int'].forEach(function(k){
  var el=qs(k), sl=qs(k+'R');
  if(el&&sl){
    el.oninput=function(){var v=Math.min(1200,Math.max(0,parseInt(el.value)||0));cs[k]=v;sl.value=v;calc()};
    sl.oninput=function(){var v=parseInt(sl.value);cs[k]=v;el.value=v;calc()};
  }
});
function calc(){
  var t=cs.spd+cs.sta+cs.pow+cs.gut+cs.int;
  qs('totalScore').textContent=t;
  var g='C',st='⭐',ti='继续加油！';
  if(t>=5000){g='SS';st='⭐⭐⭐⭐⭐';ti='完美的属性配置！'}else if(t>=4000){g='S';st='⭐⭐⭐⭐⭐';ti='优秀的育成，可挑战高难度赛事'}else if(t>=3000){g='A';st='⭐⭐⭐⭐';ti='建议继续提升速度和智力'}else if(t>=2000){g='B';st='⭐⭐⭐';ti='还有很大提升空间'}
  qs('starsDisplay').textContent=st;
  var gr=qs('gradeDisplay');gr.textContent=g+'级评价';gr.style.color=t>=4000?'var(--orange)':'var(--text)';
  qs('sugText').textContent=ti;
}
qs('saveBtn').onclick=function(){
  try{localStorage.setItem('uma_calc',JSON.stringify(cs));T('已保存 ✓')}catch(e){}
};
try{
  var s=JSON.parse(localStorage.getItem('uma_calc')||'{}');
  if(typeof s.spd!=='undefined'){['spd','sta','pow','gut','int'].forEach(function(k){
    if(typeof s[k]!=='undefined'){cs[k]=s[k];var el=qs(k);if(el)el.value=s[k];var sl=qs(k+'R');if(sl)sl.value=s[k]}
  });calc()}
}catch(e){}

qs('menuBtn').onclick=function(){this.classList.toggle('active');qs('navLinks').classList.toggle('open')};
var navLinks=qs('navLinks').querySelectorAll('a');
for(var i=0;i<navLinks.length;i++){
  navLinks[i].onclick=function(e){
    var h=this.getAttribute('href');
    if(h.charAt(0)==='#'){e.preventDefault();var el=qs(h.substring(1));if(el)el.scrollIntoView({behavior:'smooth',block:'start'})}
    qs('navLinks').classList.remove('open');qs('menuBtn').classList.remove('active');
    for(var j=0;j<navLinks.length;j++) navLinks[j].classList.remove('active');
    this.classList.add('active');
  };
}
try{
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        for(var j=0;j<navLinks.length;j++) navLinks[j].classList.remove('active');
        var l=document.querySelector('.nav-links a[href="#'+entry.target.id+'"]');
        if(l) l.classList.add('active');
      }
    });
  },{threshold:0.3});
  var sections=document.querySelectorAll('section[id]');
  for(var i=0;i<sections.length;i++) obs.observe(sections[i]);
}catch(e){}

var tb=qs('topBtn');
window.onscroll=function(){tb.style.display=window.scrollY>300?'block':'none'};
tb.onclick=function(){window.scrollTo({top:0,behavior:'smooth'})};
if(!localStorage.getItem('uma_cookie')){qs('cookie').style.display='flex'}
qs('cookieBtn').onclick=function(){localStorage.setItem('uma_cookie','1');qs('cookie').style.display='none'};

})();
