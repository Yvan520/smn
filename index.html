<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛马娘攻略站</title>
<meta name="description" content="赛马娘Pretty Derby中文攻略站">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#090d16;--surface:#111827;--card:#1a2236;--border:#1e293b;
--gold:#f0b429;--gold-dim:#c9951a;--green:#34d399;--pink:#f472b6;--blue:#60a5fa;
--text:#e2e8f0;--muted:#64748b;--radius:12px;
--font:-apple-system,BlinkMacSystemFont,'Microsoft YaHei','PingFang SC',sans-serif
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
::selection{background:var(--gold);color:#000}
.container{max-width:1100px;margin:0 auto;padding:0 20px}

/* Loading */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loader.hidden{opacity:0;pointer-events:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav */
nav{position:sticky;top:0;z-index:100;background:rgba(9,13,22,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-size:1.2rem;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:8px;letter-spacing:-.02em}
.logo span{background:var(--gold);color:#000;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:700}
.nav-links{display:flex;gap:4px;list-style:none}
.nav-links a{text-decoration:none;color:var(--muted);font-weight:600;font-size:.85rem;padding:8px 14px;border-radius:8px;transition:.2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold);background:rgba(240,180,41,.1)}
.menu-btn{display:none;flex-direction:column;gap:5px;background:0;border:none;cursor:pointer;padding:4px}
.menu-btn span{width:22px;height:2px;background:var(--text);border-radius:2px;transition:.2s}
.menu-btn.active span:nth-child(1){transform:rotate(45deg)translate(5px,5px)}
.menu-btn.active span:nth-child(2){opacity:0}
.menu-btn.active span:nth-child(3){transform:rotate(-45deg)translate(5px,-5px)}

/* Hero */
.hero{text-align:center;padding:60px 20px 50px;background:linear-gradient(135deg,rgba(240,180,41,.08) 0%,rgba(52,211,153,.05) 100%);border-bottom:1px solid var(--border)}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:.95rem;max-width:500px;margin:0 auto 24px}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-num{font-size:1.6rem;font-weight:800;color:var(--gold)}
.hero-stat-lbl{font-size:.8rem;color:var(--muted);margin-top:2px}

/* Search */
.search-wrap{max-width:600px;margin:0 auto;display:flex;gap:8px}
.search-wrap input{flex:1;padding:12px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.95rem;font-family:var(--font);outline:0;transition:.2s}
.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,180,41,.15)}
.search-wrap button{padding:12px 24px;border-radius:var(--radius);border:none;background:var(--gold);color:#000;font-weight:700;cursor:pointer;font-size:.9rem;transition:.2s;font-family:var(--font)}
.search-wrap button:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,180,41,.3)}
#suggestions{max-width:600px;margin:8px auto 0;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);display:none;overflow:hidden}
.sug-item{padding:10px 16px;cursor:pointer;font-size:.9rem;border-bottom:1px solid var(--border);transition:.15s}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:rgba(240,180,41,.08)}
.sug-item span{color:var(--muted);font-size:.8rem;margin-left:10px}

/* Sections */
section{padding:48px 0}
.section-title{font-size:1.3rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:3px;height:20px;background:var(--gold);border-radius:2px}

/* Tool Cards */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:.25s;text-decoration:none;color:var(--text)}
.tool-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 30px rgba(240,180,41,.1)}
.tool-card .icon{font-size:2rem;margin-bottom:12px;display:block}
.tool-card h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.tool-card p{color:var(--muted);font-size:.85rem;line-height:1.5}

/* Guide Cards */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.guide-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.25s;cursor:pointer}
.guide-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 30px rgba(240,180,41,.1)}
.guide-card .head{height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,rgba(240,180,41,.12),rgba(52,211,153,.08));position:relative;overflow:hidden}
.guide-card .head::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 24px,rgba(255,255,255,.02) 24px,rgba(255,255,255,.02) 48px)}
.guide-card .body{padding:16px}
.guide-card .body h3{font-size:1rem;font-weight:700;margin-bottom:6px;line-height:1.4}
.guide-card .meta{display:flex;gap:12px;font-size:.78rem;color:var(--muted);margin-bottom:8px}
.guide-card .excerpt{color:var(--muted);font-size:.82rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tag{display:inline-block;background:rgba(240,180,41,.12);color:var(--gold);padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600;margin:0 4px 4px 0}

/* News */
.news-list{display:grid;gap:10px}
.news-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:14px;transition:.2s;border-left:3px solid var(--gold)}
.news-item:hover{border-left-color:var(--green)}
.news-date{flex-shrink:0;text-align:center;background:rgba(240,180,41,.1);border-radius:8px;padding:6px 14px;min-width:50px;font-weight:700;color:var(--gold);line-height:1.2}
.news-date .d{font-size:1.2rem;font-weight:800}
.news-date .m{font-size:.7rem;opacity:.7}
.news-item h4{font-size:.92rem;font-weight:700;margin-bottom:3px}
.news-item p{font-size:.82rem;color:var(--muted)}

/* Calculator */
.calc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.calc-wrap{display:grid;grid-template-columns:1.8fr 1fr;gap:24px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-group{display:flex;flex-direction:column;gap:4px}
.stat-group label{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px}
.stat-group input[type=number]{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.9rem;font-family:var(--font);outline:0;transition:.15s;width:100%}
.stat-group input[type=number]:focus{border-color:var(--gold)}
.stat-group input[type=range]{width:100%;height:5px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:0}
.stat-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 2px 8px rgba(240,180,41,.3)}
.result-panel{background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.15);border-radius:var(--radius);padding:24px;text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center}
.result-panel .score{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.result-panel .num{font-size:2.8rem;font-weight:800;color:var(--gold);font-family:monospace;line-height:1}
.result-panel .stars{font-size:1.3rem}
.result-panel .grade{font-size:1.1rem;font-weight:700}
.result-panel .tip{color:var(--muted);font-size:.85rem}
.btn{padding:10px 24px;border-radius:var(--radius);border:none;background:var(--gold);color:#000;font-weight:700;cursor:pointer;font-size:.85rem;transition:.2s;font-family:var(--font)}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(240,180,41,.3)}

/* Footer */
footer{background:var(--surface);border-top:1px solid var(--border);padding:32px 0 20px;margin-top:48px}
.footer-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:24px;margin-bottom:20px}
footer h3{font-size:.95rem;color:var(--gold);margin-bottom:12px}
footer ul{list-style:none}
footer ul li{margin-bottom:6px}
footer a{color:var(--muted);text-decoration:none;font-size:.85rem;transition:.15s}
footer a:hover{color:var(--text)}
footer .copy{text-align:center;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);padding-top:16px}

/* Back to top */
#topBtn{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--gold);font-size:1.2rem;cursor:pointer;display:none;transition:.2s;z-index:99}
#topBtn:hover{background:var(--gold);color:#000}

/* Cookie */
#cookie{bottom:0;left:0;right:0;position:fixed;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:none;align-items:center;justify-content:space-between;gap:12px;z-index:999;font-size:.85rem}
#cookie p{color:var(--muted)}
#cookie a{color:var(--gold)}
#cookie button{padding:6px 16px;border-radius:8px;border:none;background:var(--gold);color:#000;font-weight:600;cursor:pointer;font-size:.8rem;white-space:nowrap}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.reveal{animation:fadeUp .5s ease-out both}

/* Responsive */
@media(max-width:768px){
.hero h1{font-size:1.5rem}
.calc-wrap{grid-template-columns:1fr}
.stat-grid{grid-template-columns:1fr}
.hero-stats{gap:20px}
.nav-links{position:fixed;top:60px;left:0;right:0;background:var(--surface);flex-direction:column;padding:8px 0;border-bottom:1px solid var(--border);transform:translateY(-120%);transition:.25s}
.nav-links.open{transform:translateY(0)}
.nav-links a{padding:12px 20px}
.menu-btn{display:flex}
.tools-grid,.guide-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
html{font-size:15px}
.hero{padding:40px 16px 36px}
section{padding:32px 0}
.result-panel .num{font-size:2.2rem}
}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<nav>
<div class="container nav-inner">
<div class="logo">🏇 赛马娘攻略站</div>

</div>

<div class="hero-stat"><div class="hero-stat-num" id="suppCount">0</div><div class="hero-stat-lbl">支援卡</div></div>

</div>

<footer>
<div class="container">
<div class="footer-inner">
<div><h3>🏇 赛马娘攻略站</h3><p style="color:var(--muted);font-size:.85rem">为所有训练员打造的攻略平台</p></div>

</div>
<div class="copy">© 2024 赛马娘攻略站 — 仅供参考，非官方站点</div>

<script>
// ========== Data ==========
const DATA_URL = 'data/content.json';
let C = { characters: [], supports: [], guides: [], news: [], tools: [], friendLinks: [], stats: {} };

const FALLBACK = {
  stats: { characterCount: 46, supportCount: 128, guideCount: 16 },
  tools: [
    { icon:'🧮', title:'育成计算器', description:'实时计算属性成长' },
    { icon:'🎴', title:'配卡推荐器', description:'智能推荐支援卡组合' },
    { icon:'⚡', title:'技能数据库', description:'全技能效果查询' },
    { icon:'🧬', title:'因子计算', description:'继承概率计算' }
  ],
  guides: [
    { icon:'🏆', title:'新手入门完全指南', views:15200, date:'2024-01-15', tags:['新手'], excerpt:'从零掌握赛马娘核心玩法' },
    { icon:'💎', title:'东海帝皇 URA 5星育成', views:23800, date:'2024-01-14', tags:['育成','长距离'], excerpt:'通关率95%的实战方案' },
    { icon:'🎯', title:'竞技场S级上分卡组', views:18500, date:'2024-01-13', tags:['PVP'], excerpt:'三大主流配置详解' },
    { icon:'📊', title:'支援卡性价比排行榜', views:31200, date:'2024-01-12', tags:['支援卡'], excerpt:'156张支援卡分级推荐' },
    { icon:'🧬', title:'技能继承机制深度解析', views:12300, date:'2024-01-10', tags:['机制'], excerpt:'因子系统与继承概率全解析' },
    { icon:'⚡', title:'黄金船 疾风养成指南', views:19600, date:'2024-01-08', tags:['育成','中距离'], excerpt:'稳定达成A+评价' },
    { icon:'🏫', title:'青春杯剧本完全攻略', views:28100, date:'2024-01-05', tags:['剧本'], excerpt:'全事件选项与Boss对策' },
    { icon:'🏆', title:'巅峰杯赛程规划与配卡', views:15700, date:'2023-12-28', tags:['巅峰杯'], excerpt:'粉丝数最大化配卡方案' }
  ],
  news: [
    { title:'新角色「目白善信」实装预告', date:'2024-01-20', excerpt:'长距离逃马，固有技能「白色闪电」' },
    { title:'冬季竞技场赛季开启', date:'2024-01-18', excerpt:'限定称号和SSR兑换券' },
    { title:'新春杯活动开催中', date:'2024-01-15', excerpt:'完成任任务得SSR确定券' },
    { title:'新支援卡「万圣节特别周」', date:'2024-01-08', excerpt:'限定SSR速度卡' }
  ],
  characters: [
    { name:'东海帝皇', tags:['逃马','长距离','SSR'] },
    { name:'黄金船', tags:['差马','中距离','SSR'] },
    { name:'无声铃鹿', tags:['逃马','长距离','SSR'] },
    { name:'特别周', tags:['先行','中距离','SR'] },
    { name:'小栗帽', tags:['先行','中距离','SSR'] },
    { name:'鲁道夫象征', tags:['先行','长距离','SSR'] }
  ],
  supports: [
    { name:'SSR 速子', tags:['速度','SSR'] },
    { name:'SSR 黄金船', tags:['速度','SSR'] },
    { name:'SSR 小栗帽', tags:['速度','SSR'] },
    { name:'SSR 神鹰', tags:['速度','SSR'] },
    { name:'SSR 美妙姿势', tags:['智力','SSR'] },
    { name:'SSR 鲁道夫象征', tags:['智力','SSR'] }
  ],
  friendLinks: [
    { name:'NGA赛马娘版', url:'https://nga.178.com/thread.php?fid=784' },
    { name:'GameWith(日本)', url:'https://gamewith.jp/uma-musume/' },
    { name:'Bilibili Wiki', url:'https://wiki.biligame.com/umamusume/' }
  ]
};

async function loadData() {
  try {
    const r = await fetch(DATA_URL);
    C = await r.json();
  } catch(e) {
    C = FALLBACK;
  }
  renderAll();
}

// ========== Render ==========
function renderAll() {
  const s = C.stats || {};
  document.getElementById('charCount').textContent = s.characterCount || 0;
  document.getElementById('suppCount').textContent = s.supportCount || 0;
  document.getElementById('guideCount').textContent = s.guideCount || 0;

  // Tools
  const tg = document.getElementById('toolsGrid');
  tg.innerHTML = (C.tools || []).map(t => `
    <div class="tool-card">
      <span class="icon">${t.icon}</span>
      <h3>${t.title}</h3>
      <p>${t.description}</p>
    </div>
  `).join('');

  // Guides
  const gg = document.getElementById('guideGrid');
  gg.innerHTML = (C.guides || []).map(g => `
    <div class="guide-card">
      <div class="head">${g.icon||'📖'}</div>
      <div class="body">
        <h3>${g.title}</h3>
        <div class="meta"><span>👁 ${fmt(g.views||0)}</span><span>⏱ ${g.date||''}</span></div>
        <div class="excerpt">${(g.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')} ${g.excerpt}</div>
      </div>
    </div>
  `).join('');

  // News
  const nl = document.getElementById('newsList');
  nl.innerHTML = (C.news || []).map(n => {
    const d = new Date(n.date);
    return `<div class="news-item">
      <div class="news-date"><div class="d">${d.getDate()}</div><div class="m">${d.getMonth()+1}月</div></div>
      <div><h4>${n.title}</h4><p>${n.excerpt}</p></div>
    </div>`;
  }).join('');

  // Friend links
  document.getElementById('friendLinks').innerHTML = (C.friendLinks || []).map(f =>
    `<li><a href="${f.url}" target="_blank" rel="noopener">${f.name}</a></li>`
  ).join('');
}

function fmt(n) {
  return n >= 10000 ? (n/10000).toFixed(1)+'w' : n.toLocaleString();
}

// ========== Search ==========
const searchData = [];

async function buildSearchIndex() {
  searchData.length = 0;
  (C.characters || []).forEach(c => searchData.push({ name:c.name, type:'角色', tags:c.tags||[] }));
  (C.supports || []).forEach(s => searchData.push({ name:s.name, type:'支援卡', tags:s.tags||[] }));
  (C.guides || []).forEach(g => searchData.push({ name:g.title, type:'攻略', tags:g.tags||[] }));
}

const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const sug = document.getElementById('suggestions');

function doSearch(q) {
  if (!q || q.length < 1) { sug.style.display = 'none'; return; }
  const kw = q.toLowerCase();
  const results = searchData.filter(item =>
    item.name.toLowerCase().includes(kw) ||
    (item.tags || []).some(t => t.toLowerCase().includes(kw))
  ).slice(0, 10);
  if (!results.length) { sug.style.display = 'none'; return; }
  sug.innerHTML = results.map(r =>
    `<div class="sug-item"><strong>${r.name}</strong><span>${r.type}</span></div>`
  ).join('');
  sug.style.display = 'block';
}

searchInput.addEventListener('input', e => doSearch(e.target.value));
searchInput.addEventListener('blur', () => setTimeout(() => sug.style.display='none', 200));
searchInput.addEventListener('focus', () => { if(searchInput.value) doSearch(searchInput.value); });
searchBtn.addEventListener('click', () => doSearch(searchInput.value));
searchInput.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(searchInput.value); });

// ========== Calculator ==========
const calcStats = {
  spd: { el: null, sl: null, v: 800 },
  sta: { el: null, sl: null, v: 600 },
  pow: { el: null, sl: null, v: 700 },
  gut: { el: null, sl: null, v: 500 },
  int: { el: null, sl: null, v: 650 }
};

Object.keys(calcStats).forEach(k => {
  const s = calcStats[k];
  s.el = document.getElementById(k);
  s.sl = document.getElementById(k + 'R');
  if (s.el && s.sl) {
    s.el.addEventListener('input', () => { s.v = Math.min(1200, Math.max(0, parseInt(s.el.value)||0)); s.sl.value = s.v; calc(); });
    s.sl.addEventListener('input', () => { s.v = parseInt(s.sl.value); s.el.value = s.v; calc(); });
  }
});

function calc() {
  const total = Object.values(calcStats).reduce((sum, s) => sum + s.v, 0);
  const totalEl = document.getElementById('totalScore');
  const starsEl = document.getElementById('starsDisplay');
  const gradeEl = document.getElementById('gradeDisplay');
  const sugEl = document.getElementById('sugText');

  totalEl.textContent = total;

  let grade = 'C', stars = '⭐', tip = '还在成长期，继续加油！';
  if (total >= 5000) { grade = 'SS'; stars = '⭐⭐⭐⭐⭐'; tip = '完美的属性配置！'; }
  else if (total >= 4000) { grade = 'S'; stars = '⭐⭐⭐⭐⭐'; tip = '优秀的育成，可挑战高难度赛事'; }
  else if (total >= 3000) { grade = 'A'; stars = '⭐⭐⭐⭐'; tip = '建议继续提升速度和智力'; }
  else if (total >= 2000) { grade = 'B'; stars = '⭐⭐⭐'; tip = '继续提升，还有很大空间'; }

  starsEl.textContent = stars;
  gradeEl.textContent = grade + '级评价';
  gradeEl.style.color = total >= 4000 ? 'var(--gold)' : 'var(--text)';
  sugEl.textContent = tip;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  try {
    const d = {}; Object.keys(calcStats).forEach(k => d[k] = calcStats[k].v);
    localStorage.setItem('uma_calc', JSON.stringify(d));
    showToast('配置已保存 ✓');
  } catch(e) {}
});

try {
  const saved = JSON.parse(localStorage.getItem('uma_calc') || '{}');
  Object.keys(saved).forEach(k => {
    if (calcStats[k]) {
      calcStats[k].v = saved[k];
      if (calcStats[k].el) calcStats[k].el.value = saved[k];
      if (calcStats[k].sl) calcStats[k].sl.value = saved[k];
    }
  });
  calc();
} catch(e) {}

// ========== UI ==========
// Mobile menu
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('menuBtn').classList.toggle('active');
  document.getElementById('navLinks').classList.toggle('open');
});

// Nav scroll
document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', e => {
    const href = a.getAttribute('href');
    if (href.startsWith('#')) {
      e.preventDefault();
      const el = document.querySelector(href);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
      document.getElementById('navLinks').classList.remove('open');
      document.getElementById('menuBtn').classList.remove('active');
      document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
      a.classList.add('active');
    }
  });
});

// IntersectionObserver for active nav
const sections = document.querySelectorAll('section[id]');
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
      const link = document.querySelector(`.nav-links a[href="#${e.target.id}"]`);
      if (link) link.classList.add('active');
    }
  });
}, { threshold: 0.3 });
sections.forEach(s => obs.observe(s));

// Back to top
const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.style.display = window.scrollY > 300 ? 'block' : 'none';
});
topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// Cookie consent
if (!localStorage.getItem('uma_cookie')) {
  document.getElementById('cookie').style.display = 'flex';
}
document.getElementById('cookieBtn').addEventListener('click', () => {
  localStorage.setItem('uma_cookie', '1');
  document.getElementById('cookie').style.display = 'none';
});

// Toast
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:80px;right:20px;background:var(--gold);color:#000;padding:10px 20px;border-radius:10px;font-weight:600;z-index:9999;animation:fadeUp .3s ease-out;font-size:.9rem';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2000);
}

// ========== Init ==========
(async () => {
  await loadData();
  await buildSearchIndex();
  document.getElementById('loader').classList.add('hidden');
  // Reveal animations
  document.querySelectorAll('.tool-card, .guide-card, .news-item').forEach((el,i) => {
    el.style.animationDelay = (i*0.05)+'s';
    el.classList.add('reveal');
  });
})();
</script>
