.hd-r a{padding:5px 10px;color:rgba(255,255,255,.55);font-size:.73rem;border-radius:5px;transition:.12s;}

.mb{display:none;flex-direction:column;gap:3px;background:none;border:none;cursor:pointer;padding:4px;}
.mb span{width:18px;height:2px;background:var(--gold);border-radius:2px;}

/* HERO */
.he{padding:60px 20px 50px;text-align:center;background:linear-gradient(135deg,#0b0f1a 0%,#151d30 50%,#1a2640 100%);color:#fff;position:relative;overflow:hidden;}
.he::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(240,180,0,.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(46,204,113,.03) 0%,transparent 60%);}
.he-i{position:relative;z-index:1;max-width:600px;margin:0 auto;}
.he h1{font-size:2rem;font-weight:700;margin-bottom:4px;letter-spacing:-.5px;}
.he h1 em{font-style:normal;background:linear-gradient(135deg,var(--gold),#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.he p{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:20px;}
.sb{display:flex;max-width:400px;margin:0 auto;gap:6px;}
.sb input{flex:1;padding:9px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:.82rem;outline:none;font-family:var(--font);}
.sb input::placeholder{color:rgba(255,255,255,.25);}
.sb input:focus{border-color:var(--gold);}
.sb button{padding:9px 20px;border-radius:8px;border:none;background:var(--gold);color:var(--nav);font-weight:600;cursor:pointer;font-size:.8rem;font-family:var(--font);}
#sr{max-width:400px;margin:4px auto 0;background:#fff;border-radius:8px;display:none;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.25);text-align:left;}
.sr-i{padding:7px 12px;cursor:pointer;font-size:.8rem;border-bottom:1px solid #eee;color:var(--txt);}
.sr-i:last-child{border-bottom:none;}
.sr-i:hover{background:#f8f6f2;}
.sr-i b{background:#fef5e7;color:#b87a10;padding:0 5px;border-radius:3px;font-size:.6rem;font-weight:600;margin-right:4px;}

/* LAYOUT */
.w{max-width:1100px;margin:0 auto;padding:0 20px;}
.sec{padding:36px 0;}
.sec-t{font-size:1rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.sec-t .cnt{color:var(--mtd);font-size:.7rem;font-weight:400;margin-left:2px;}

/* GUIDES */
.fg{display:grid;gap:8px;}
.fg>div{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden;transition:.2s;cursor:pointer;display:flex;box-shadow:var(--shadow);}
.fg>div:hover{border-color:#ddd;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.fg .gl{width:80px;min-height:76px;background:linear-gradient(135deg,var(--accent),#2a3a5e);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
.fg .gr{padding:10px 14px;flex:1;}
.fg .gr .gs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;}
.gt{font-size:.58rem;font-weight:500;padding:1px 6px;border-radius:4px;background:#eef2f7;color:#4a5a7a;}
.fg .gr h3{font-size:.85rem;font-weight:600;margin-bottom:1px;}
.fg .gr .m{font-size:.68rem;color:var(--mtd);margin-bottom:2px;}
.fg .gr .e{font-size:.72rem;color:var(--mtd);}

/* TOOLS */
.tl{display:flex;gap:6px;flex-wrap:wrap;}
.tc{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:10px;flex:1;min-width:130px;cursor:pointer;transition:.2s;box-shadow:var(--shadow);}

.tc .i{font-size:1.2rem;flex-shrink:0;}
.tc .t{font-size:.76rem;font-weight:600;margin-bottom:1px;}
.tc .d{font-size:.66rem;color:var(--mtd);}

/* CHARACTERS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.cc{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:14px 8px;text-align:center;transition:.2s;cursor:pointer;box-shadow:var(--shadow);}
.cc:hover{border-color:#ddd;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.cc .nm{font-size:.8rem;font-weight:600;margin-bottom:1px;}
.cc .jp{font-size:.58rem;color:var(--mtd);margin-bottom:6px;}
.cc .bs{display:flex;flex-direction:column;gap:2px;margin-bottom:6px;}
.cc .bs>div{display:flex;align-items:center;gap:4px;font-size:.56rem;color:var(--mtd);}
.cc .bs>div .b{height:3px;background:var(--bd);border-radius:2px;flex:1;overflow:hidden;}
.cc .bs>div .b .f{height:100%;border-radius:2px;}
.cc .tg{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;}
.cc .tg b{font-size:.54rem;font-weight:600;padding:1px 6px;border-radius:5px;display:inline-block;}

/* SUPPORTS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:10px 12px;transition:.2s;cursor:pointer;box-shadow:var(--shadow);}
.sc:hover{border-color:#ddd;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.sc .nm{font-size:.78rem;font-weight:600;margin-bottom:1px;display:flex;align-items:center;gap:4px;}
.sc .mt{font-size:.64rem;color:var(--mtd);margin-bottom:3px;}
.sc .tg{display:flex;flex-wrap:wrap;gap:2px;}
.sc .tg b{font-size:.54rem;font-weight:600;padding:1px 6px;border-radius:5px;display:inline-block;}

.t-sp{background:#eafaf1;color:#1a8a4a}.t-st{background:#fef5e7;color:#b87a10}.t-pw{background:#fdedec;color:#b13030}.t-gu{background:#eaf2f8;color:#1a6fa0}.t-in{background:#f4ecf7;color:#7a3fa8}
.t-es{background:#eaf2f8;color:#1a5c9e}.t-ds{background:#fce8e8;color:#b13030}.t-ch{background:#eeeaf6;color:#5a4a7a}.t-zh{background:#fef5e7;color:#a07016}

.ni{background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:10px 14px;display:flex;gap:10px;transition:.1s;box-shadow:var(--shadow);}

.fb button.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* CALC */
.cw{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;background:var(--card);border:1px solid var(--bd);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}

.cgi{display:flex;flex-direction:column;gap:1px;}

.cgi input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
.rp{background:linear-gradient(135deg,var(--nav),var(--accent));border-radius:var(--radius);padding:16px;text-align:center;display:flex;flex-direction:column;gap:4px;align-items:center;color:#fff;}

.rp .sr{font-size:.85rem;}

@media(max-width:768px){
